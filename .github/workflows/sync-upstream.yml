name: sync-upstream

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          fetch-depth: 0

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/microsoft/regorus.git
          git fetch upstream main

      - name: Check for new release
        id: check
        run: |
          CURRENT=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)
          UPSTREAM=$(git show upstream/main:Cargo.toml | sed -n 's/^version = "\(.*\)"/\1/p' | head -1)
          echo "current=$CURRENT upstream=$UPSTREAM"
          echo "upstream=$UPSTREAM" >> $GITHUB_OUTPUT
          if [ "$CURRENT" != "$UPSTREAM" ]; then
            echo "new_release=true" >> $GITHUB_OUTPUT
          else
            echo "new_release=false" >> $GITHUB_OUTPUT
          fi

      - name: Sync main to upstream (preserving our workflows)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          UPSTREAM_SHA=$(git rev-parse upstream/main)

          # If main is already "upstream/main + 1 preserve commit", nothing to do.
          if [ "$(git rev-parse main^ 2>/dev/null || echo none)" = "$UPSTREAM_SHA" ]; then
            echo "Already in sync with upstream."
            exit 0
          fi

          # Capture our .github/workflows tree from current main (= origin/main).
          OUR_WORKFLOWS_TREE=$(git rev-parse HEAD:.github/workflows)

          # Reset main to upstream, then splice our workflows on top as one commit.
          # The net diff from origin/main never touches .github/workflows, so the
          # default GITHUB_TOKEN's lack of `workflows` permission isn't a blocker.
          git checkout -B main "$UPSTREAM_SHA"
          git rm -rf --cached --ignore-unmatch .github/workflows
          git read-tree --prefix=.github/workflows/ "$OUR_WORKFLOWS_TREE"

          git commit -m "preserve gordon-to workflows"
          git push origin main --force

      - name: Trigger publish
        if: steps.check.outputs.new_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run publish-python.yml --ref publish -f target=pypi
